name: microvm-isolation

# Proves the MicroVmSandbox BACKEND runs the real chef inside a hardware-
# accelerated virtual machine (QEMU/KVM) on a hosted Linux runner — the rung
# above the OS sandboxes (its own kernel, not just a confined process). The
# gated test drives the actual backend through the normal loop and asserts the
# in-VM chef's draft is byte-identical to the subprocess backend. Granular steps
# so a failure localizes via the API's per-step conclusions (CI logs need auth).

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  kvm-microvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install qemu + ext4 tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qemu-system-x86 e2fsprogs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install package
        run: pip install -e ".[dev]"

      - name: build the chef rootfs image
        run: docker build -t sentinel-microvm-rootfs -f microvm/Dockerfile.rootfs .

      - name: export the image to an ext4 root disk
        run: |
          set -e
          cid=$(docker create sentinel-microvm-rootfs)
          mkdir rootfs
          docker export "$cid" | sudo tar -C rootfs -xf -
          docker rm "$cid"
          dd if=/dev/zero of=rootfs.ext4 bs=1M count=1500 status=none
          sudo mkfs.ext4 -q -d rootfs rootfs.ext4
          sudo chmod 644 rootfs.ext4

      - name: stage a readable kernel + initrd and open /dev/kvm
        run: |
          set -e
          sudo cp /boot/vmlinuz-"$(uname -r)" vmlinuz && sudo chmod 644 vmlinuz
          sudo cp /boot/initrd.img-"$(uname -r)" initrd && sudo chmod 644 initrd
          sudo chmod 666 /dev/kvm

      - name: prove MicroVmSandbox runs the real chef in a KVM VM (byte-identical)
        env:
          SENTINEL_TEST_MICROVM: "1"
          SENTINEL_MICROVM_ROOTFS: ${{ github.workspace }}/rootfs.ext4
          SENTINEL_MICROVM_KERNEL: ${{ github.workspace }}/vmlinuz
          SENTINEL_MICROVM_INITRD: ${{ github.workspace }}/initrd
        run: python -m pytest sentinel_slice/tests/test_microvm_sandbox.py -v
