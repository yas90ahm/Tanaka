name: sandbox-isolation

# Proves the chef sandbox GUARANTEE (not just the contract) on real OS/runtime
# boundaries, on every push and PR. Four jobs:
#   - container-isolation (Linux): builds the chef image, runs a real chef in a
#     hardened container, then again under gVisor (runsc).
#   - appcontainer-isolation (Windows): the in-process AppContainer microsandbox
#     proofs — OS-enforced no-network + foreign-read denial.
#   - linux-sandbox-isolation (Linux): the in-process seccomp microsandbox proof
#     — a BPF filter (ctypes) that makes network syscalls return EACCES.
#   - macos-sandbox-isolation (macOS): the Seatbelt microsandbox proof — the
#     built-in `sandbox-exec` applies a network-deny profile, then execs the chef.
# The OS-microsandbox proofs are gated out of the default ubuntu suite (ci.yml)
# and run here.
# Together they turn "sandbox is a subprocess contract" into "sandbox is a real,
# OS-enforced isolation boundary." Kept separate from ci.yml because each needs a
# specific OS + runtime.

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  container-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Build the chef image
        run: docker build -t sentinel-chef .

      - name: Run a real chef in a hardened container (no gVisor)
        env:
          SENTINEL_TEST_CONTAINER: "1"
          SENTINEL_SANDBOX_IMAGE: "sentinel-chef"
        run: python -m pytest sentinel_slice/tests/test_sandbox.py -q

      - name: Install gVisor (runsc)
        run: |
          set -e
          (
            ARCH=$(uname -m)
            URL="https://storage.googleapis.com/gvisor/releases/release/latest/${ARCH}"
            wget --quiet "${URL}/runsc" "${URL}/runsc.sha512" \
                 "${URL}/containerd-shim-runsc-v1" "${URL}/containerd-shim-runsc-v1.sha512"
            sha512sum -c runsc.sha512 -c containerd-shim-runsc-v1.sha512
            sudo mv runsc containerd-shim-runsc-v1 /usr/local/bin/
            sudo chmod a+rx /usr/local/bin/runsc /usr/local/bin/containerd-shim-runsc-v1
          )
          sudo /usr/local/bin/runsc install
          sudo systemctl reload docker || sudo systemctl restart docker

      - name: Run the same chef under gVisor (runsc)
        env:
          SENTINEL_TEST_CONTAINER: "1"
          SENTINEL_SANDBOX_IMAGE: "sentinel-chef"
          SENTINEL_SANDBOX_RUNTIME: "runsc"
        run: python -m pytest sentinel_slice/tests/test_sandbox.py -q

  appcontainer-isolation:
    # The in-process microsandbox: no Docker, no daemon — the slice asks the
    # Windows kernel directly (CreateAppContainerProfile + a zero-capability
    # security profile + icacls confinement + a kill-on-close Job object). These
    # proofs are gated behind SENTINEL_TEST_APPCONTAINER=1 and skipped on the
    # default ubuntu suite; here they actually run on Windows every push/PR.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Prove the AppContainer microsandbox (OS-enforced no-network + foreign-read denial)
        env:
          SENTINEL_TEST_APPCONTAINER: "1"
        run: python -m pytest sentinel_slice/tests/test_appcontainer.py -v

  linux-sandbox-isolation:
    # The in-process Linux microsandbox: no Docker, no daemon — a seccomp BPF
    # filter (ctypes), applied in the forked child before exec, makes network
    # syscalls return EACCES. Privilege-free (NO_NEW_PRIVS + filter), so it works
    # on the hosted runner. Gated behind SENTINEL_TEST_LINUX_SANDBOX=1 and skipped
    # on the default ubuntu suite; here it runs every push/PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Prove the seccomp+landlock microsandbox (network + filesystem)
        env:
          SENTINEL_TEST_LINUX_SANDBOX: "1"
        run: python -m pytest sentinel_slice/tests/test_linux_sandbox.py -v

  macos-sandbox-isolation:
    # The macOS microsandbox: no install — the built-in `sandbox-exec` applies a
    # Seatbelt profile that denies network, then execs the chef. Gated behind
    # SENTINEL_TEST_MAC_SANDBOX=1; runs every push/PR (public repo: macOS minutes
    # are free).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: "test: seatbelt_denies_network"
        if: always()
        env: { SENTINEL_TEST_MAC_SANDBOX: "1" }
        run: python -m pytest "sentinel_slice/tests/test_mac_sandbox.py::test_seatbelt_denies_network_operation" -q
      - name: "test: seatbelt_confines_writes"
        if: always()
        env: { SENTINEL_TEST_MAC_SANDBOX: "1" }
        run: python -m pytest "sentinel_slice/tests/test_mac_sandbox.py::test_seatbelt_confines_writes" -q
      - name: "test: real_chef_matches_subprocess"
        if: always()
        env: { SENTINEL_TEST_MAC_SANDBOX: "1" }
        run: python -m pytest "sentinel_slice/tests/test_mac_sandbox.py::test_real_chef_under_macsandbox_matches_subprocess" -q
