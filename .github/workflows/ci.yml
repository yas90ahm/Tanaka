name: ci

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12", "3.13" ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run the behavior suite
        run: python -m pytest -q

      - name: Verify the committed demo ledger (standalone, public key only)
        run: |
          python sentinel_slice/verify_ledger.py \
            ledger.db sentinel_slice/keys/cashier_ed25519_public.pem
